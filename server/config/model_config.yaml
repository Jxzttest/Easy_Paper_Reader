llm:
  api_key: "sk-uyw7RoKzxFU4ugfOHzKLAJ9JkOUL9mKQUnrwIcR8jchDbKyC"        # 从环境变量读取，也可直接填写
  base_url: "https://api.aipaibox.com/v1"      # 如使用代理/转发，填实际地址；官方填 https://api.openai.com/v1
  model_name: "claude-opus-4-6"
  temperature: 0.7
  max_tokens: 4096

embedding:
  api_key: "sk-rddsewlxoutlgbjxyhicjewefyzkqhsnicqduosxnteoelha"
  base_url: "https://api.siliconflow.cn/v1"
  model_name: "Qwen/Qwen3-Embedding-4B"  # 维度 1536；也可用 text-embedding-3-large（3072维）
  dimensions: 1536                       # 与 model_name 保持一致

# PDF 解析模式：pymupdf（快速，纯文字）或 paddleocr（精准，支持图表/公式）
parser:
  default_mode: "pymupdf"              # 可选: pymupdf | paddleocr

# 本地存储路径（相对于项目根目录）
storage:
  data_dir: "./data"                   # SQLite 和 ChromaDB 统一放这里
  papers_dir: "./data/papers"          # 上传的 PDF 原件
  assets_dir: "./data/assets"          # OCR 裁剪的图片

# 翻译模型配置
translation:
  mode: api                            # api | local
  # --- api 模式（默认，复用 llm 配置的 key/url）---
  api_key: "sk-uyw7RoKzxFU4ugfOHzKLAJ9JkOUL9mKQUnrwIcR8jchDbKyC"
  base_url: "https://api.aipaibox.com/v1"
  model_name: "claude-opus-4-6"
  # --- local 模式（本地小模型，取消注释并修改路径后切换 mode: local）---
  # local_model_path: "./models/opus-mt-en-zh"   # Helsinki-NLP MarianMT 模型目录
  # local_model_type: "marian"                    # marian | m2m100
  # use_gpu: false                                # true 时使用 GPU 推理
