llm:
  api_key: "${OPENAI_API_KEY}"        # 从环境变量读取，也可直接填写
  base_url: "${OPENAI_BASE_URL}"      # 如使用代理/转发，填实际地址；官方填 https://api.openai.com/v1
  model_name: "gpt-4o"
  temperature: 0.7
  max_tokens: 4096

embedding:
  api_key: "${OPENAI_API_KEY}"
  base_url: "${OPENAI_BASE_URL}"
  model_name: "text-embedding-3-small"  # 维度 1536；也可用 text-embedding-3-large（3072维）
  dimensions: 1536                       # 与 model_name 保持一致

# PDF 解析模式：pymupdf（快速，纯文字）或 paddleocr（精准，支持图表/公式）
parser:
  default_mode: "pymupdf"              # 可选: pymupdf | paddleocr

# 本地存储路径（相对于项目根目录）
storage:
  data_dir: "./data"                   # SQLite 和 ChromaDB 统一放这里
  papers_dir: "./data/papers"          # 上传的 PDF 原件
  assets_dir: "./data/assets"          # OCR 裁剪的图片
